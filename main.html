<style>
body {
    margin: 0;

    font-family: Arial, sans-serif;

}

h1 {
    font-size: 46px;

.blessing {

.message {
    font-size: 18px;
    line-height: 1.6;
    max-width: 760px;
    margin: 0 auto 20px;
    color: white;
}

.top-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 30px;
}

audio {
    width: 300px;
    max-width: 90%;
}

button {
    padding: 14px 26px;
    font-size: 18px;
    background: #fdd835;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #fbc02d;
}

/* whole rotating record */
.record-wrap {
    position: relative;
    width: 720px;
    height: 720px;
    margin: 10px auto 0;
}

.spin-group {
    position: absolute;
    inset: 0;
    animation: spin 16s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.record {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 620px;
    height: 620px;
    background: #111;
    border-radius: 50%;
    box-shadow:
        0 0 0 8px #1b1b1b,
        0 0 0 16px #0a0a0a,
        0 20px 40px rgba(0,0,0,0.35);
}

.record::before {
    content: "";
    position: absolute;
    inset: 22px;
    border-radius: 50%;
    background:
        repeating-radial-gradient(
            circle,
            #151515 0px,
            #151515 9px,
            #101010 10px,
            #101010 18px
        );
}

/* red center */
.center-label {
    position: absolute;
    width: 210px;
    height: 210px;
    background: #e84a2a;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
}

.center-hole {
    position: absolute;
    width: 46px;
    height: 46px;
    background: black;
    border-radius: 50%;
    z-index: 4;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* curved text */
.curve-text {
    position: absolute;
    width: 210px;
    height: 210px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
}

.curve-text svg {
    width: 100%;
    height: 100%;
    overflow: visible;
}

.curve-text text {
    fill: black;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 3px;
}

/* photo ring */
.photo-ring {
    position: absolute;
    inset: 0;
    z-index: 5;
}

/* square photos */
.photo {
    position: absolute;
    width: 92px;
    height: 92px;
    object-fit: cover;
    box-shadow: 0 6px 18px rgba(0,0,0,0.28);
    transition: transform 0.25s ease;
}

/* keep photos upright while disc spins */
.photo-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 92px;
    height: 92px;
    margin-left: -46px;
    margin-top: -46px;
}

.photo-slot img {
    animation: spin-back 16s linear infinite;
}

@keyframes spin-back {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
}

.photo:hover {
    transform: scale(1.06);
}

/* evenly spaced around disc */
.slot1  { transform: rotate(0deg) translateY(-235px); }
.slot2  { transform: rotate(36deg) translateY(-235px); }
.slot3  { transform: rotate(72deg) translateY(-235px); }
.slot4  { transform: rotate(108deg) translateY(-235px); }
.slot5  { transform: rotate(144deg) translateY(-235px); }
.slot6  { transform: rotate(180deg) translateY(-235px); }
.slot7  { transform: rotate(216deg) translateY(-235px); }
.slot8  { transform: rotate(252deg) translateY(-235px); }
.slot9  { transform: rotate(288deg) translateY(-235px); }
.slot10 { transform: rotate(324deg) translateY(-235px); }

@media (max-width: 800px) {
    .record-wrap {
        width: 95vw;
        height: 95vw;
        max-width: 720px;
        max-height: 720px;
    }
}
</style>
