<!DOCTYPE html>
<html>
<head>
<title>Football Page ⚽</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background:
        repeating-linear-gradient(
            90deg,
            #2f8f46 0px,
            #2f8f46 90px,
            #2b7f3f 90px,
            #2b7f3f 180px
        );
    position: relative;
}

/* dark overlay for cleaner text */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.18);
    pointer-events: none;
}

/* title block */
.header {
    position: relative;
    z-index: 2;
    padding-top: 20px;
}

h1 {
    display: inline-block;
    margin: 0;
    padding: 10px 18px;
    font-size: 42px;
    background: rgba(0,0,0,0.35);
    border-radius: 8px;
}

.intro {
    margin: 14px auto 10px;
    max-width: 760px;
    font-size: 19px;
    line-height: 1.5;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.45);
}

/* field */
.pitch {
    position: relative;
    z-index: 2;
    width: 1200px;
    height: 680px;
    margin: 20px auto 100px;
    border: 4px solid rgba(255,255,255,0.95);
    box-sizing: border-box;
}

/* halfway line */
.pitch::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 4px;
    background: rgba(255,255,255,0.95);
    transform: translateX(-50%);
}

/* center circle */
.pitch::after {
    content: "";
    position: absolute;
    width: 180px;
    height: 180px;
    border: 4px solid rgba(255,255,255,0.95);
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* penalty + goal boxes */
.penalty-left,
.penalty-right,
.goal-left,
.goal-right {
    position: absolute;
    border: 4px solid rgba(255,255,255,0.95);
    box-sizing: border-box;
}

.penalty-left {
    width: 170px;
    height: 330px;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
    border-left: none;
}

.penalty-right {
    width: 170px;
    height: 330px;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    border-right: none;
}

.goal-left {
    width: 70px;
    height: 170px;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
    border-left: none;
}

.goal-right {
    width: 70px;
    height: 170px;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    border-right: none;
}

/* player cards */
.player {
    position: absolute;
    width: 120px;
    transform: translate(-50%, -50%);
    z-index: 3;
}

.player img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    background: white;
}

.tag {
    margin-top: 8px;
    display: inline-block;
    background: rgba(0,0,0,0.38);
    padding: 6px 10px;
    border-radius: 8px;
    line-height: 1.25;
    font-size: 14px;
    font-weight: bold;
}

.tag span {
    display: block;
    font-size: 12px;
    font-weight: normal;
}

/* 4-3-3 style positions */
.gk  { left: 8%;  top: 50%; }

.lb  { left: 18%; top: 18%; }
.lcb { left: 27%; top: 35%; }
.rcb { left: 27%; top: 65%; }
.rb  { left: 18%; top: 82%; }

.lcm { left: 45%; top: 28%; }
.cm  { left: 50%; top: 50%; }
.rcm { left: 45%; top: 72%; }

.lw  { left: 73%; top: 18%; }
.st  { left: 82%; top: 50%; }
.rw  { left: 73%; top: 82%; }

/* button */
button {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 26px;
    font-size: 18px;
    background: #fdd835;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    z-index: 5;
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

button:hover {
    background: #fbc02d;
}

/* smaller screens */
@media (max-width: 1250px) {
    .pitch {
        width: 95vw;
        height: 54vw;
        min-height: 560px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>cuz ur officially 18 rn</h1>
    <p class="intro">
        and i have always loved u just like i love football.

    </p>
</div>

<div class="pitch">
    <div class="penalty-left"></div>
    <div class="penalty-right"></div>
    <div class="goal-left"></div>
    <div class="goal-right"></div>

    <div class="player gk">
        <img src="3092A2D6-A464-4C50-AF6F-EFE1F773FE02.jpg" alt="GK">
        <div class="tag">Goalkeeper</div>
    </div>

    <div class="player lb">
        <img src="IMG_9960.jpg" alt="LB">
        <div class="tag">Left Back</div>
    </div>

    <div class="player lcb">
        <img src="IMG_4710.png" alt="LCB">
        <div class="tag">Center Back</div>
    </div>

    <div class="player rcb">
        <img src="HEIF_Image.jpg" alt="RCB">
        <div class="tag">Center Back</div>
    </div>

    <div class="player rb">
        <img src="IMG_0350.jpg" alt="RB">
        <div class="tag">Right Back</div>
    </div>

    <div class="player lcm">
        <img src="IMG_0621.jpg" alt="LCM">
        <div class="tag">Midfielder</div>
    </div>

    <div class="player cm">
        <img src="IMG_7169.png" alt="CM">
        <div class="tag">Central Mid</div>
    </div>

    <div class="player rcm">
        <img src="IMG_9647.png" alt="RCM">
        <div class="tag">Attacking Mid</div>
    </div>

    <div class="player lw">
        <img src="FFE7AAEE-AE31-411D-A5F8-37E0C54BE085.jpg" alt="LW">
        <div class="tag">Left Wing</div>
    </div>

    <div class="player st">
        <img src="IMG_2636.png" alt="ST">
        <div class="tag">Striker</div>
    </div>

    <div class="player rw">
        <img src="972252DB-6EB8-472A-BF64-B964B3CCF43F.jpg" alt="RW">
        <div class="tag">Right Wing</div>
    </div>
</div>

<button onclick="goNext()">click for 18+ content</button>

<script>
function goNext() {
    window.location.href = "main.html";
}
</script>

</body>
</html>
