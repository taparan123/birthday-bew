<!DOCTYPE html>
<html>
<head>
<title>ilysmacsly</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    text-align: center;
    font-family: Arial, sans-serif;
    padding: 40px 20px;

    background:
        radial-gradient(circle, #ff6b6b 2px, transparent 2px),
        radial-gradient(circle, #4ecdc4 2px, transparent 2px),
        radial-gradient(circle, #ffe66d 2px, transparent 2px),
        linear-gradient(135deg, #fff3b0, #ffd6a5);

    background-size:
        50px 50px,
        70px 70px,
        90px 90px,
        cover;

    background-position:
        0 0,
        20px 20px,
        40px 40px,
        center;
}

h1 {
    font-size: 52px;
    margin-bottom: 10px;
}

p {
    font-size: 22px;
    margin-bottom: 40px;
}

/* MAIN CONTAINER */
.main {
    width: 900px;
    margin: 0 auto;
}

/* GALLERY (3 columns now) */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 250px);
    justify-content: space-between;
    row-gap: 40px;
}

/* IMAGES */
.gallery img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 24px rgba(0,0,0,0.25);
}

/* BUTTON */
button {
    display: block;
    margin: 40px auto 0;
    padding: 15px 25px;
    font-size: 18px;
    background: #fdd835;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    transition: transform 0.2s ease, background 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    background: #fbc02d;
}
</style>
</head>

<body>

<h1>hey OG</h1>
<p>remember when we used to be cringe together? i guess time seems to move faster than we thought</p>

        <img src="IMG_5550.jpg">
        <img src="IMG_1894.png">
        <img src="image.jpg">
    </div>
</div>

}
</script>

</body>
</html>
